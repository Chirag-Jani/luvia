[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.localnet]
luvia_presale = "H6DXYanZ9uiDsUqwsXu7GKNH1E1WHdqKoJr9JqqzA8cP"

[programs.devnet]
luvia_presale = "H6DXYanZ9uiDsUqwsXu7GKNH1E1WHdqKoJr9JqqzA8cP"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
# Tests are run against whichever cluster [provider].cluster points at (devnet by default).
# Use `ANCHOR_PROVIDER_URL=... ANCHOR_WALLET=... yarn run ts-mocha ...` to override per-run.
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
deploy = "yarn run ts-node migrations/deploy.ts"

[test]
startup_wait = 15000

# When running `anchor test` with the local validator, fork the Pyth solana-receiver
# program from devnet so the presale can read SOL/USD price updates locally.
# If you test on devnet/mainnet directly with `yarn test`, these blocks are unused.
[test.validator]
url = "https://api.devnet.solana.com"

[[test.validator.clone_upgradeable_program]]
address = "rec5EKMGg6MxZYaMdyBfgwp4d5rB9T1VQH5pJv5LtFJ"
