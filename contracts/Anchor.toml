[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.devnet]
luvia_presale = "Fxgt8HY2fgnhef62Sx6HUowLh6uQti6dpe6rJmUV5qGP"

[programs.localnet]
luvia_presale = "Fxgt8HY2fgnhef62Sx6HUowLh6uQti6dpe6rJmUV5qGP"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
deploy = "yarn run ts-node migrations/deploy.ts"
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[test]
startup_wait = 15000
shutdown_wait = 2000
upgradeable = false

[test.validator]
bind_address = "0.0.0.0"
url = "https://api.devnet.solana.com"
ledger = ".anchor/test-ledger"
rpc_port = 8899
